<svg width="520" height="420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="520" height="420" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="260" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Uncontrolled</text>
  <text x="260" y="58" text-anchor="middle" font-size="13" fill="#64748b">상태가 안쪽(컴포넌트)에 있다</text>

  <!-- Parent box -->
  <rect x="50" y="74" width="420" height="106" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="260" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">부모 컴포넌트</text>
  <text x="260" y="118" text-anchor="middle" font-size="11" fill="#94a3b8">(상태 없음 — useState 불필요)</text>

  <!-- No state indicator -->
  <rect x="90" y="128" width="340" height="36" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="260" y="147" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="'SF Mono', Consolas, monospace">— 상태 없음 —</text>
  <text x="260" y="161" text-anchor="middle" font-size="10" fill="#cbd5e1">부모는 현재 선택된 탭을 모른다</text>

  <!-- Down arrow (dashed = one time only) -->
  <line x1="260" y1="180" x2="260" y2="234" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arr-gray)"/>
  <rect x="140" y="190" width="240" height="26" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="260" y="207" text-anchor="middle" font-size="11" font-family="'SF Mono', Consolas, monospace" fill="#94a3b8">defaultValue='all'</text>
  <text x="260" y="228" text-anchor="middle" font-size="10" fill="#94a3b8">딱 한 번, 초기값만 전달</text>

  <!-- Component box -->
  <rect x="90" y="234" width="340" height="106" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="260" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">StatusTabFilter</text>

  <!-- Internal state pill -->
  <rect x="110" y="266" width="300" height="28" rx="5" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5"/>
  <text x="260" y="284" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" font-family="'SF Mono', Consolas, monospace">internalValue = 'all'  ← 상태가 여기</text>

  <!-- Tab buttons -->
  <rect x="108" y="302" width="52" height="26" rx="5" fill="#16a34a"/>
  <text x="134" y="319" text-anchor="middle" font-size="11" fill="white" font-weight="600">전체</text>

  <rect x="168" y="302" width="52" height="26" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="194" y="319" text-anchor="middle" font-size="11" fill="#15803d">완독</text>

  <rect x="228" y="302" width="66" height="26" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="261" y="319" text-anchor="middle" font-size="11" fill="#15803d">읽는 중</text>

  <rect x="302" y="302" width="78" height="26" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="341" y="319" text-anchor="middle" font-size="11" fill="#15803d">읽고 싶은</text>

  <!-- No up arrow — blocked -->
  <line x1="260" y1="340" x2="260" y2="376" stroke="#fca5a5" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="260" cy="382" r="10" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="260" y="387" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">✕</text>

  <!-- No callback note -->
  <text x="260" y="410" text-anchor="middle" font-size="11" fill="#f87171">부모는 현재 탭 값을 알 수 없음 — 외부 리셋 불가</text>
</svg>
