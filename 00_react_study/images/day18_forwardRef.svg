<svg width="760" height="620" viewBox="0 0 760 620" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo', 'Pretendard', 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="620" fill="#f8fafc" rx="16"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">forwardRef / useImperativeHandle 흐름</text>
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#64748b">부모가 자식 DOM 또는 메서드를 제어하는 3가지 케이스</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CASE 1: 일반 컴포넌트 (ref 불가) -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="24" y="90" font-size="12" font-weight="700" fill="#ef4444">CASE 1</text>
  <text x="68" y="90" font-size="12" fill="#ef4444">일반 컴포넌트 — ref 전달 불가</text>

  <!-- 부모 박스 -->
  <rect x="24" y="100" width="180" height="110" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" rx="10"/>
  <text x="114" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">부모 컴포넌트</text>
  <rect x="40" y="126" width="148" height="36" fill="#f1f5f9" rx="6"/>
  <text x="114" y="139" text-anchor="middle" font-size="10" fill="#334155">const ref = useRef()</text>
  <text x="114" y="153" text-anchor="middle" font-size="10" fill="#334155">ref.current → null</text>
  <rect x="40" y="170" width="148" height="28" fill="#fee2e2" rx="6"/>
  <text x="114" y="181" text-anchor="middle" font-size="10" fill="#b91c1c">&lt;BookSearchInput</text>
  <text x="114" y="193" text-anchor="middle" font-size="10" fill="#b91c1c">  ref={ref} /&gt;</text>

  <!-- 화살표 (막힘) -->
  <line x1="204" y1="155" x2="258" y2="155" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="228" y="148" text-anchor="middle" font-size="10" fill="#ef4444">ref</text>

  <!-- 금지 표시 -->
  <circle cx="272" cy="155" r="14" fill="none" stroke="#ef4444" stroke-width="2"/>
  <line x1="262" y1="145" x2="282" y2="165" stroke="#ef4444" stroke-width="2"/>

  <!-- 자식 박스 -->
  <rect x="296" y="100" width="180" height="110" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" rx="10"/>
  <text x="386" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">BookSearchInput</text>
  <rect x="312" y="126" width="148" height="36" fill="#f1f5f9" rx="6"/>
  <text x="386" y="139" text-anchor="middle" font-size="10" fill="#334155">function BookSearchInput(</text>
  <text x="386" y="153" text-anchor="middle" font-size="10" fill="#334155">  { onSearch }  ← ref 없음</text>
  <rect x="312" y="170" width="148" height="28" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="386" y="181" text-anchor="middle" font-size="10" fill="#94a3b8">&lt;Input /&gt;</text>
  <text x="386" y="193" text-anchor="middle" font-size="10" fill="#94a3b8">(ref 접근 불가)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CASE 2: forwardRef -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="24" y="240" font-size="12" font-weight="700" fill="#3b82f6">CASE 2</text>
  <text x="68" y="240" font-size="12" fill="#3b82f6">forwardRef — DOM 직접 노출</text>

  <!-- 부모 박스 -->
  <rect x="24" y="250" width="180" height="130" fill="#fff" stroke="#bfdbfe" stroke-width="1.5" rx="10"/>
  <text x="114" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">부모 컴포넌트</text>
  <rect x="40" y="276" width="148" height="36" fill="#eff6ff" rx="6"/>
  <text x="114" y="289" text-anchor="middle" font-size="10" fill="#1e40af">const ref = useRef()</text>
  <text x="114" y="303" text-anchor="middle" font-size="10" fill="#1e40af">// HTMLInputElement</text>
  <rect x="40" y="320" width="148" height="20" fill="#dbeafe" rx="4"/>
  <text x="114" y="333" text-anchor="middle" font-size="10" fill="#1d4ed8">&lt;BookSearchInput ref={ref}/&gt;</text>
  <rect x="40" y="348" width="148" height="20" fill="#dbeafe" rx="4"/>
  <text x="114" y="361" text-anchor="middle" font-size="10" fill="#1d4ed8">ref.current.focus() ← 가능!</text>

  <!-- 화살표 ref 전달 -->
  <line x1="204" y1="315" x2="295" y2="315" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="248" y="308" text-anchor="middle" font-size="10" fill="#3b82f6">ref 전달</text>

  <!-- 자식 박스 -->
  <rect x="296" y="250" width="200" height="130" fill="#fff" stroke="#bfdbfe" stroke-width="1.5" rx="10"/>
  <text x="396" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">BookSearchInput</text>
  <rect x="312" y="276" width="168" height="50" fill="#eff6ff" rx="6"/>
  <text x="396" y="289" text-anchor="middle" font-size="10" fill="#1e40af">forwardRef(</text>
  <text x="396" y="303" text-anchor="middle" font-size="10" fill="#1e40af">  (props, ref) =&gt; {"{"}  ← ref 수신</text>
  <text x="396" y="317" text-anchor="middle" font-size="10" fill="#1e40af">  return &lt;Input ref={"{ref}"}/&gt;</text>
  <rect x="312" y="334" width="168" height="28" fill="#dbeafe" rx="6"/>
  <text x="396" y="345" text-anchor="middle" font-size="10" fill="#1e40af">&lt;Input ref={"{ref}"}/&gt;</text>
  <text x="396" y="358" text-anchor="middle" font-size="10" fill="#1e40af">(실제 DOM에 연결)</text>

  <!-- 화살표 DOM 연결 -->
  <line x1="496" y1="315" x2="575" y2="315" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="534" y="308" text-anchor="middle" font-size="10" fill="#3b82f6">DOM 노출</text>

  <!-- DOM 박스 -->
  <rect x="576" y="275" width="148" height="80" fill="#fff" stroke="#bfdbfe" stroke-width="1.5" rx="10"/>
  <text x="650" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">실제 DOM</text>
  <rect x="592" y="300" width="116" height="44" fill="#eff6ff" rx="6"/>
  <text x="650" y="316" text-anchor="middle" font-size="11" fill="#1e40af">&lt;input&gt;</text>
  <text x="650" y="332" text-anchor="middle" font-size="10" fill="#60a5fa">.focus()  .value</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CASE 3: useImperativeHandle -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="24" y="415" font-size="12" font-weight="700" fill="#8b5cf6">CASE 3</text>
  <text x="68" y="415" font-size="12" fill="#8b5cf6">useImperativeHandle — 메서드만 노출 (캡슐화)</text>

  <!-- 부모 박스 -->
  <rect x="24" y="425" width="180" height="140" fill="#fff" stroke="#ddd6fe" stroke-width="1.5" rx="10"/>
  <text x="114" y="443" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">부모 컴포넌트</text>
  <rect x="40" y="451" width="148" height="48" fill="#f5f3ff" rx="6"/>
  <text x="114" y="464" text-anchor="middle" font-size="10" fill="#5b21b6">const ref = useRef()</text>
  <text x="114" y="478" text-anchor="middle" font-size="10" fill="#5b21b6">// {"{"}focus, clear{"}"} 타입</text>
  <text x="114" y="492" text-anchor="middle" font-size="10" fill="#5b21b6">// HTMLInputElement X</text>
  <rect x="40" y="507" width="148" height="20" fill="#ede9fe" rx="4"/>
  <text x="114" y="520" text-anchor="middle" font-size="10" fill="#6d28d9">ref.current.focus()</text>
  <rect x="40" y="533" width="148" height="20" fill="#ede9fe" rx="4"/>
  <text x="114" y="546" text-anchor="middle" font-size="10" fill="#6d28d9">ref.current.clear() ← 가능!</text>

  <!-- 화살표 -->
  <line x1="204" y1="490" x2="295" y2="490" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="248" y="483" text-anchor="middle" font-size="10" fill="#8b5cf6">ref 전달</text>

  <!-- 자식 박스 -->
  <rect x="296" y="425" width="230" height="140" fill="#fff" stroke="#ddd6fe" stroke-width="1.5" rx="10"/>
  <text x="411" y="443" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">BookSearchInput</text>
  <rect x="312" y="451" width="198" height="80" fill="#f5f3ff" rx="6"/>
  <text x="411" y="466" text-anchor="middle" font-size="10" fill="#5b21b6">forwardRef((props, ref) =&gt; {"{"}</text>
  <text x="411" y="480" text-anchor="middle" font-size="10" fill="#5b21b6">  const inputRef = useRef()  ← 내부용</text>
  <text x="411" y="494" text-anchor="middle" font-size="10" fill="#5b21b6">  useImperativeHandle(ref, () =&gt; ({"{"}</text>
  <text x="411" y="508" text-anchor="middle" font-size="10" fill="#5b21b6">    focus: () =&gt; inputRef.current?.focus()</text>
  <text x="411" y="522" text-anchor="middle" font-size="10" fill="#5b21b6">    clear: () =&gt; {"{"} setInputValue('') {"}"}</text>

  <!-- 벽(캡슐화) -->
  <line x1="526" y1="430" x2="526" y2="560" stroke="#c4b5fd" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="530" y="510" font-size="10" fill="#7c3aed">DOM</text>
  <text x="530" y="523" font-size="10" fill="#7c3aed">숨김</text>

  <!-- DOM 박스 -->
  <rect x="576" y="450" width="148" height="80" fill="#fff" stroke="#ddd6fe" stroke-width="1.5" rx="10"/>
  <text x="650" y="468" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">실제 DOM</text>
  <rect x="592" y="475" width="116" height="44" fill="#f5f3ff" rx="6"/>
  <text x="650" y="491" text-anchor="middle" font-size="11" fill="#6d28d9">&lt;input&gt;</text>
  <text x="650" y="507" text-anchor="middle" font-size="10" fill="#a78bfa">직접 접근 불가</text>

  <!-- 점선 (내부에서만 접근) -->
  <line x1="526" y1="490" x2="575" y2="490" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- 하단 요약 표 -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="24" y="586" width="712" height="22" fill="#f1f5f9" rx="6"/>
  <text x="160" y="601" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">일반 컴포넌트</text>
  <text x="160" y="614" text-anchor="middle" font-size="10" fill="#ef4444">ref 전달 불가</text>
  <line x1="300" y1="586" x2="300" y2="608" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="601" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">forwardRef</text>
  <text x="430" y="614" text-anchor="middle" font-size="10" fill="#3b82f6">DOM 노드 직접 노출</text>
  <line x1="560" y1="586" x2="560" y2="608" stroke="#e2e8f0" stroke-width="1"/>
  <text x="648" y="601" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">useImperativeHandle</text>
  <text x="648" y="614" text-anchor="middle" font-size="10" fill="#8b5cf6">메서드만 선택적 노출</text>
</svg>
