<svg width="600" height="520" viewBox="0 0 600 520" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo', 'Pretendard', sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-red-left" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="600" height="520" fill="#f8fafc" rx="16"/>

  <!-- Title -->
  <text x="300" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">상태 끌어올리기 (Lift State Up)</text>
  <text x="300" y="54" text-anchor="middle" font-size="12" fill="#64748b">두 자식이 같은 상태를 공유해야 할 때</text>

  <!-- ── BEFORE (왼쪽) ── -->
  <text x="140" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">❌ 상태가 자식 안에 있으면</text>

  <!-- DashboardContent (before) -->
  <rect x="40" y="96" width="200" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="140" y="121" text-anchor="middle" font-size="12" fill="#64748b">DashboardContent</text>

  <line x1="90" y1="136" x2="90" y2="160" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="190" y1="136" x2="190" y2="160" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- DashboardCharts (has state) -->
  <rect x="30" y="160" width="120" height="52" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="90" y="181" text-anchor="middle" font-size="11" fill="#7f1d1d">DashboardCharts</text>
  <rect x="38" y="188" width="104" height="16" rx="3" fill="#fecaca"/>
  <text x="90" y="200" text-anchor="middle" font-size="9" fill="#991b1b" font-family="monospace">selectedMonth = 3</text>

  <!-- DashboardBookList (no state) -->
  <rect x="150" y="160" width="100" height="52" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="200" y="181" text-anchor="middle" font-size="11" fill="#64748b">BookList</text>
  <text x="200" y="200" text-anchor="middle" font-size="10" fill="#94a3b8">? 어떻게</text>
  <text x="200" y="212" text-anchor="middle" font-size="10" fill="#94a3b8">알 수 있나?</text>

  <!-- X mark -->
  <text x="140" y="240" text-anchor="middle" font-size="22" fill="#dc2626">✕</text>
  <text x="140" y="262" text-anchor="middle" font-size="10" fill="#dc2626">서로 상태를 공유할 수 없다</text>

  <!-- ── AFTER (오른쪽) ── -->
  <text x="430" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">✅ 상태를 부모로 올리면</text>

  <!-- DashboardContent (after — has state) -->
  <rect x="310" y="96" width="240" height="56" rx="8" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
  <text x="430" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">DashboardContent</text>
  <rect x="320" y="126" width="220" height="16" rx="3" fill="#bbf7d0"/>
  <text x="430" y="138" text-anchor="middle" font-size="9" fill="#14532d" font-family="monospace">selectedMonth = 3  ← 여기서 관리</text>

  <!-- Arrow left down -->
  <line x1="370" y1="152" x2="370" y2="178" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="256" y="155" width="108" height="18" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="310" y="168" text-anchor="middle" font-size="9" fill="#1d4ed8">onMonthClick 콜백 내려줌</text>

  <!-- Arrow right down -->
  <line x1="490" y1="152" x2="490" y2="178" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="496" y="155" width="96" height="18" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="544" y="168" text-anchor="middle" font-size="9" fill="#1d4ed8">selectedMonth 내려줌</text>

  <!-- DashboardCharts -->
  <rect x="310" y="178" width="120" height="52" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="370" y="199" text-anchor="middle" font-size="11" fill="#9a3412">DashboardCharts</text>
  <text x="370" y="216" text-anchor="middle" font-size="10" fill="#9a3412">막대 클릭 →</text>
  <text x="370" y="228" text-anchor="middle" font-size="10" fill="#9a3412">onMonthClick(3)</text>

  <!-- Callback arrow going up -->
  <path d="M 320 205 C 285 205, 285 130, 320 130" stroke="#ef4444" stroke-width="1.8" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <rect x="242" y="158" width="70" height="32" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="277" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">콜백 실행</text>
  <text x="277" y="184" text-anchor="middle" font-size="9" fill="#ef4444">→ 부모 상태 변경</text>

  <!-- DashboardBookList -->
  <rect x="440" y="178" width="120" height="52" rx="8" fill="#faf5ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="500" y="199" text-anchor="middle" font-size="11" fill="#6b21a8">DashboardBookList</text>
  <text x="500" y="216" text-anchor="middle" font-size="10" fill="#7e22ce">selectedMonth=3</text>
  <text x="500" y="228" text-anchor="middle" font-size="10" fill="#7e22ce">→ 3월 책만 표시</text>

  <!-- Check mark -->
  <text x="430" y="258" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
  <text x="430" y="278" text-anchor="middle" font-size="10" fill="#16a34a">부모를 통해 상태를 공유한다</text>

  <!-- Divider -->
  <line x1="30" y1="296" x2="570" y2="296" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Flow summary -->
  <text x="300" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">실제 코드 흐름</text>

  <rect x="30" y="332" width="540" height="32" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="300" y="353" text-anchor="middle" font-size="11" fill="#9a3412">① DashboardCharts의 월 막대 클릭 → onMonthClick(3) 호출</text>

  <line x1="300" y1="364" x2="300" y2="378" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="30" y="378" width="540" height="32" rx="8" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5"/>
  <text x="300" y="399" text-anchor="middle" font-size="11" fill="#166534">② DashboardContent의 setSelectedMonth(3) 실행 → 리렌더링</text>

  <line x1="300" y1="410" x2="300" y2="424" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="30" y="424" width="540" height="32" rx="8" fill="#faf5ff" stroke="#d946ef" stroke-width="1.5"/>
  <text x="300" y="445" text-anchor="middle" font-size="11" fill="#6b21a8">③ DashboardBookList가 selectedMonth=3 받음 → 3월 책만 필터링</text>

  <!-- Bottom note -->
  <rect x="30" y="470" width="540" height="36" rx="8" fill="#fef9c3"/>
  <text x="300" y="486" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">핵심: 상태는 그 상태를 필요로 하는 컴포넌트들의 "가장 가까운 공통 부모"에 둔다</text>
  <text x="300" y="500" text-anchor="middle" font-size="11" fill="#854d0e">= Lowest Common Ancestor</text>

</svg>
