<svg width="700" height="720" viewBox="0 0 700 720" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo', 'Pretendard', sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="720" fill="#f8fafc" rx="16"/>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">props 내려주기 vs 콜백으로 올리기</text>
  <text x="350" y="56" text-anchor="middle" font-size="12" fill="#64748b">실제 코드 3가지 패턴 비교</text>

  <!-- ─────────────────────────────── -->
  <!--  PATTERN 1: Props down (왼쪽)  -->
  <!-- ─────────────────────────────── -->
  <rect x="20" y="72" width="300" height="28" rx="6" fill="#dbeafe"/>
  <text x="170" y="91" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">패턴 1 — 부모 → 자식 props 전달</text>

  <!-- GlobalBooksPage -->
  <rect x="40" y="108" width="260" height="64" rx="10" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
  <text x="170" y="129" text-anchor="middle" font-size="10" fill="#15803d" font-weight="600">Server Component</text>
  <text x="170" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">GlobalBooksPage</text>
  <text x="170" y="164" text-anchor="middle" font-size="10" fill="#15803d">books: GlobalBook[]  (Supabase 조회)</text>

  <!-- Arrow down -->
  <line x1="170" y1="172" x2="170" y2="206" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Props label -->
  <rect x="178" y="178" width="160" height="24" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="258" y="194" text-anchor="middle" font-size="10" fill="#1d4ed8">book={books[i]}  isReadProp  isLikedProp</text>

  <!-- BookListItem -->
  <rect x="40" y="206" width="260" height="52" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="170" y="226" text-anchor="middle" font-size="10" fill="#9a3412" font-weight="600">Client Component</text>
  <text x="170" y="246" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">BookListItem</text>

  <!-- Arrow down to LikeButton -->
  <line x1="170" y1="258" x2="170" y2="290" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="178" y="263" width="128" height="22" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="242" y="278" text-anchor="middle" font-size="10" fill="#1d4ed8">bookId  initialLiked</text>

  <!-- LikeButton -->
  <rect x="80" y="290" width="180" height="52" rx="10" fill="#fdf4ff" stroke="#d946ef" stroke-width="2"/>
  <text x="170" y="310" text-anchor="middle" font-size="10" fill="#7e22ce" font-weight="600">Client Component</text>
  <text x="170" y="330" text-anchor="middle" font-size="14" font-weight="700" fill="#6b21a8">LikeButton</text>

  <!-- Self loop on LikeButton -->
  <path d="M 260 316 C 300 316, 300 340, 260 340" stroke="#a855f7" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <rect x="262" y="318" width="62" height="18" rx="4" fill="#faf5ff"/>
  <text x="293" y="331" text-anchor="middle" font-size="9" fill="#7e22ce">자체 상태</text>

  <!-- Note box -->
  <rect x="40" y="356" width="260" height="42" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="60" y="373" font-size="10" font-weight="700" fill="#6b21a8">LikeButton 핵심:</text>
  <text x="60" y="389" font-size="10" fill="#7e22ce">부모에게 콜백 없이 직접 API 호출 + router.refresh()</text>

  <!-- ─────────────────────────────── -->
  <!--  PATTERN 2: Callback up (오른쪽) -->
  <!-- ─────────────────────────────── -->
  <rect x="380" y="72" width="300" height="28" rx="6" fill="#fee2e2"/>
  <text x="530" y="91" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">패턴 2 — 자식 → 부모 콜백 전달</text>

  <!-- DashboardContent -->
  <rect x="400" y="108" width="260" height="76" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="530" y="128" text-anchor="middle" font-size="10" fill="#9a3412" font-weight="600">Client Component</text>
  <text x="530" y="147" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">DashboardContent</text>
  <rect x="416" y="155" width="228" height="18" rx="4" fill="#1e293b"/>
  <text x="530" y="168" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="monospace">const handleDelete = (id) =&gt; { ... }</text>

  <!-- Arrow down -->
  <line x1="530" y1="184" x2="530" y2="216" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="538" y="189" width="148" height="24" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="612" y="199" text-anchor="middle" font-size="10" fill="#1d4ed8">book={books[i]}</text>
  <text x="612" y="211" text-anchor="middle" font-size="10" fill="#1d4ed8">onDelete={handleDelete}</text>

  <!-- BookCard -->
  <rect x="400" y="216" width="260" height="64" rx="10" fill="#fff1f2" stroke="#fb7185" stroke-width="2"/>
  <text x="530" y="237" text-anchor="middle" font-size="10" fill="#be123c" font-weight="600">Client Component</text>
  <text x="530" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#9f1239">BookCard</text>
  <text x="530" y="272" text-anchor="middle" font-size="10" fill="#be123c">삭제 버튼 클릭 → onDelete(book.id) 호출</text>

  <!-- Callback arrow (left side going up) -->
  <path d="M 405 255 C 360 255, 360 160, 405 160" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <rect x="320" y="195" width="80" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="360" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">콜백 실행</text>
  <text x="360" y="220" text-anchor="middle" font-size="10" fill="#ef4444">onDelete(id)</text>

  <!-- Code snippet -->
  <rect x="400" y="294" width="260" height="52" rx="8" fill="#1e293b"/>
  <text x="416" y="312" font-size="10" fill="#64748b" font-family="monospace">// BookCard.tsx:132</text>
  <text x="416" y="330" font-size="10" fill="#f8fafc" font-family="monospace">{onDelete &amp;&amp;</text>
  <text x="416" y="344" font-size="10" fill="#f8fafc" font-family="monospace">  &lt;Button onClick={() =&gt; onDelete(book.id)}/&gt;}</text>

  <!-- ─────────────────────────────── -->
  <!-- PATTERN 3: Self-contained -->
  <!-- ─────────────────────────────── -->
  <rect x="20" y="416" width="660" height="28" rx="6" fill="#dcfce7"/>
  <text x="350" y="435" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">패턴 3 — 자체 완결형 (콜백 없이 스스로 처리)</text>

  <!-- DeleteBookButton -->
  <rect x="40" y="456" width="280" height="76" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="180" y="476" text-anchor="middle" font-size="10" fill="#9a3412" font-weight="600">Client Component</text>
  <text x="180" y="496" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">DeleteBookButton</text>
  <text x="180" y="515" text-anchor="middle" font-size="10" fill="#9a3412">bookId만 받음, 콜백 없음</text>
  <text x="180" y="530" text-anchor="middle" font-size="10" fill="#9a3412">삭제 → router.push('/books')</text>

  <!-- Arrow to API -->
  <line x1="320" y1="494" x2="390" y2="494" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <rect x="394" y="468" width="256" height="52" rx="8" fill="#1e293b"/>
  <text x="408" y="487" font-size="10" fill="#64748b" font-family="monospace">// DeleteBookButton.tsx</text>
  <text x="408" y="505" font-size="10" fill="#f8fafc" font-family="monospace">const { bookId } = props  // id만 받음</text>
  <text x="408" y="519" font-size="10" fill="#f8fafc" font-family="monospace">deleteBook(bookId) → router.push()</text>

  <!-- Divider -->
  <line x1="40" y1="548" x2="660" y2="548" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Summary table -->
  <text x="350" y="572" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">3가지 패턴 비교</text>

  <!-- Header row -->
  <rect x="40" y="582" width="620" height="24" rx="4" fill="#e2e8f0"/>
  <text x="130" y="598" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">컴포넌트</text>
  <text x="310" y="598" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">부모→자식 (props)</text>
  <text x="490" y="598" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">자식→부모 (이벤트)</text>
  <text x="630" y="598" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">처리 위치</text>

  <!-- Row 1 -->
  <rect x="40" y="606" width="620" height="24" rx="0" fill="#f8fafc"/>
  <text x="130" y="622" text-anchor="middle" font-size="11" fill="#1e293b">BookListItem</text>
  <text x="310" y="622" text-anchor="middle" font-size="11" fill="#1d4ed8">book, isReadProp, isLikedProp</text>
  <text x="490" y="622" text-anchor="middle" font-size="11" fill="#94a3b8">없음</text>
  <text x="630" y="622" text-anchor="middle" font-size="11" fill="#7e22ce">LikeButton 내부</text>

  <!-- Row 2 -->
  <rect x="40" y="630" width="620" height="24" rx="0" fill="#f1f5f9"/>
  <text x="130" y="646" text-anchor="middle" font-size="11" fill="#1e293b">BookCard</text>
  <text x="310" y="646" text-anchor="middle" font-size="11" fill="#1d4ed8">book, onDelete?</text>
  <text x="490" y="646" text-anchor="middle" font-size="11" fill="#ef4444">onDelete(book.id)</text>
  <text x="630" y="646" text-anchor="middle" font-size="11" fill="#166534">부모가 처리</text>

  <!-- Row 3 -->
  <rect x="40" y="654" width="620" height="24" rx="0" fill="#f8fafc"/>
  <text x="130" y="670" text-anchor="middle" font-size="11" fill="#1e293b">DeleteBookButton</text>
  <text x="310" y="670" text-anchor="middle" font-size="11" fill="#1d4ed8">bookId</text>
  <text x="490" y="670" text-anchor="middle" font-size="11" fill="#94a3b8">없음</text>
  <text x="630" y="670" text-anchor="middle" font-size="11" fill="#7c2d12">자체 완결</text>

  <line x1="40" y1="678" x2="660" y2="678" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="40" y1="582" x2="40" y2="678" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="220" y1="582" x2="220" y2="678" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="400" y1="582" x2="400" y2="678" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="580" y1="582" x2="580" y2="678" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="660" y1="582" x2="660" y2="678" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Bottom note -->
  <rect x="40" y="690" width="620" height="22" rx="6" fill="#fef9c3"/>
  <text x="350" y="705" text-anchor="middle" font-size="11" fill="#854d0e">핵심: 자식이 직접 처리할 수 있으면 콜백 불필요. 부모가 알아야 할 때만 콜백을 올린다.</text>

</svg>
