<svg width="600" height="560" viewBox="0 0 600 560" xmlns="http://www.w3.org/2000/svg" font-family="'Apple SD Gothic Neo', 'Pretendard', sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="600" height="560" fill="#f8fafc" rx="16"/>

  <text x="300" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">파생 상태 vs 독립 상태</text>
  <text x="300" y="54" text-anchor="middle" font-size="12" fill="#64748b">계산할 수 있으면 state로 만들지 않는다</text>

  <!-- ── 독립 상태 (왼쪽) ── -->
  <rect x="20" y="70" width="260" height="26" rx="6" fill="#dbeafe"/>
  <text x="150" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">독립 상태 — useState 필요</text>

  <rect x="20" y="104" width="260" height="160" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>

  <rect x="36" y="116" width="228" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="150" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af" font-family="monospace">currentPage</text>
  <text x="150" y="145" text-anchor="middle" font-size="10" fill="#3b82f6">다른 값으로 계산 불가 → state 필요</text>

  <rect x="36" y="160" width="228" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="150" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af" font-family="monospace">statusFilter</text>
  <text x="150" y="189" text-anchor="middle" font-size="10" fill="#3b82f6">사용자가 선택 → state 필요</text>

  <rect x="36" y="204" width="228" height="36" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="150" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af" font-family="monospace">sortOption</text>
  <text x="150" y="233" text-anchor="middle" font-size="10" fill="#3b82f6">사용자가 선택 → state 필요</text>

  <!-- ── 파생 상태 (오른쪽) ── -->
  <rect x="320" y="70" width="260" height="26" rx="6" fill="#dcfce7"/>
  <text x="450" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">파생 상태 — 계산으로 충분</text>

  <rect x="320" y="104" width="260" height="160" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>

  <rect x="336" y="116" width="228" height="36" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="450" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d" font-family="monospace">filteredBooks</text>
  <text x="450" y="145" text-anchor="middle" font-size="10" fill="#16a34a">books + 필터들로 계산 가능</text>

  <rect x="336" y="160" width="228" height="36" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="450" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d" font-family="monospace">totalPages</text>
  <text x="450" y="189" text-anchor="middle" font-size="10" fill="#16a34a">filteredBooks.length / 12 로 계산 가능</text>

  <rect x="336" y="204" width="228" height="36" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="450" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d" font-family="monospace">paginatedBooks</text>
  <text x="450" y="233" text-anchor="middle" font-size="10" fill="#16a34a">filteredBooks.slice()로 계산 가능</text>

  <!-- Divider -->
  <line x1="20" y1="282" x2="580" y2="282" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ── 안티패턴 ── -->
  <rect x="20" y="294" width="260" height="26" rx="6" fill="#fee2e2"/>
  <text x="150" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">❌ 안티패턴</text>

  <rect x="20" y="328" width="260" height="100" rx="8" fill="#1e293b"/>
  <text x="36" y="347" font-size="10" fill="#64748b" font-family="monospace">// 이렇게 하면 안 된다</text>
  <text x="36" y="364" font-size="10" fill="#f8fafc" font-family="monospace">const [filtered, setFiltered] =</text>
  <text x="36" y="378" font-size="10" fill="#f8fafc" font-family="monospace">  useState&lt;Book[]&gt;([]);</text>
  <text x="36" y="395" font-size="10" fill="#f8fafc" font-family="monospace">useEffect(() =&gt; {</text>
  <text x="36" y="409" font-size="10" fill="#f8fafc" font-family="monospace">  setFiltered(books.filter(...));</text>
  <text x="36" y="422" font-size="10" fill="#f8fafc" font-family="monospace">}, [books, selectedMonth, ...]);</text>

  <!-- Why bad -->
  <rect x="20" y="436" width="260" height="60" rx="8" fill="#fef2f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="150" y="453" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">왜 나쁜가?</text>
  <text x="36" y="469" font-size="10" fill="#dc2626">• 렌더링이 2번 발생 (state 업데이트 → 재렌더)</text>
  <text x="36" y="483" font-size="10" fill="#dc2626">• 의존성 배열 관리 실수 → 버그 가능성</text>

  <!-- ── 올바른 패턴 ── -->
  <rect x="320" y="294" width="260" height="26" rx="6" fill="#dcfce7"/>
  <text x="450" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">✅ 올바른 패턴</text>

  <rect x="320" y="328" width="260" height="100" rx="8" fill="#1e293b"/>
  <text x="336" y="347" font-size="10" fill="#64748b" font-family="monospace">// 렌더링 중에 바로 계산</text>
  <text x="336" y="364" font-size="10" fill="#4ade80" font-family="monospace">const filteredBooks = books</text>
  <text x="336" y="378" font-size="10" fill="#f8fafc" font-family="monospace">  .filter((book) =&gt; {</text>
  <text x="336" y="392" font-size="10" fill="#f8fafc" font-family="monospace">    if (selectedMonth !== null)</text>
  <text x="336" y="406" font-size="10" fill="#f8fafc" font-family="monospace">      return bookMonth === selectedMonth;</text>
  <text x="336" y="420" font-size="10" fill="#f8fafc" font-family="monospace">  });</text>

  <!-- Why good -->
  <rect x="320" y="436" width="260" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="450" y="453" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">왜 좋은가?</text>
  <text x="336" y="469" font-size="10" fill="#16a34a">• 렌더링 1번, 항상 최신 값 보장</text>
  <text x="336" y="483" font-size="10" fill="#16a34a">• 의존성 관리 필요 없음 (자동 최신)</text>

  <!-- Bottom rule -->
  <rect x="20" y="508" width="560" height="36" rx="8" fill="#fef9c3"/>
  <text x="300" y="523" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">판단 기준: "이 값을 다른 state/props로부터 계산할 수 있는가?"</text>
  <text x="300" y="538" text-anchor="middle" font-size="11" fill="#854d0e">YES → 그냥 계산하라  |  NO → useState 사용</text>

</svg>
