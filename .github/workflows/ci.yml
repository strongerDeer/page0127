name: CI

# main 브랜치로의 PR과 push마다 lint / type-check / build를 자동 실행한다.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22 + npm 캐시(package-lock.json 해시 기준)로 설치 속도 확보
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # lockfile 기준 정확 재현 설치. package.json과 어긋나면 여기서 실패한다.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      # 단위 테스트(vitest): 순수 함수만 검증하므로 서버·Supabase secrets가 필요 없다.
      # 브라우저 스모크(Playwright)는 별도 job으로 분리한다.
      - name: Unit test
        run: npm run test

      # 빌드는 OpenAI 클라이언트가 모듈 로드 시점에 키를 요구하므로 더미 값을 준다.
      # (실제 키는 Vercel에만 존재. CI는 컴파일 성공 여부만 검증한다.)
      - name: Build
        run: npm run build
        env:
          OPENAI_API_KEY: dummy

  # 브라우저 스모크(Playwright). quality와 독립적으로 병렬 실행된다.
  # 앱 렌더에 Supabase 공개 env가 필요하므로 secrets를 주입한다.
  # ⚠️ 운영이 아닌 "테스트/스테이징" Supabase 프로젝트 값을 secrets에 넣어야 안전하다.
  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # secrets가 실제로 이 job에 전달됐는지 먼저 확인한다(값은 노출하지 않고 SET/UNSET만).
      # 비어 있으면 여기서 즉시 실패 → webServer 120초 타임아웃 대신 원인이 바로 드러난다.
      - name: Check Supabase secrets present
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL 이(가) 비어 있음 — repository secret 이름/스코프 확인 필요"
            missing=1
          else
            echo "NEXT_PUBLIC_SUPABASE_URL: SET (length=${#NEXT_PUBLIC_SUPABASE_URL})"
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_ANON_KEY 이(가) 비어 있음 — repository secret 이름/스코프 확인 필요"
            missing=1
          else
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY: SET (length=${#NEXT_PUBLIC_SUPABASE_ANON_KEY})"
          fi
          exit $missing

      # 프로덕션 빌드. NEXT_PUBLIC_* 값은 이 시점에 번들에 박히므로 여기서 env를 준다.
      # (turbo strict env 모드라, 이 값들은 turbo.json build task의 env에도 선언돼 있어야 전달된다)
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: dummy

      # Chromium 브라우저와 실행에 필요한 시스템 라이브러리를 설치한다.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/page0127

      # CI에선 reuseExistingServer:false → webServer가 next start로 새 서버를 띄운다.
      # (위 Build 산출물 .next를 사용)
      - name: Run E2E smoke
        run: npm run test:e2e -w page0127
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: dummy
